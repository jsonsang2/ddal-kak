<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 문의 - 딸깍</title>
    <meta name="description" content="딸깍 사이트 제휴, 광고, 협업 문의 페이지입니다.">
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5500659564258597"
         crossorigin="anonymous"></script>
</head>
<body>
    <button id="theme-toggle" aria-label="다크 모드 전환">🌙</button>
    <nav class="main-nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">딸깍</a>
            <ul class="nav-links">
                <li><a href="index.html">번호 생성</a></li>
                <li><a href="guide.html">로또 가이드</a></li>
                <li><a href="stats.html">당첨 통계</a></li>
                <li><a href="about.html">소개</a></li>
                <li><a href="contact.html" class="active">제휴 문의</a></li>
            </ul>
        </div>
    </nav>

    <div class="contact-container">
        <h1>제휴 문의</h1>
        <p class="subtitle">제휴 및 협업에 관심이 있으시면 아래 양식을 작성해 주세요.</p>
        <form id="contact-form" action="https://formspree.io/f/mojkwvlr" method="POST">
            <div class="form-group">
                <label for="name">이름 / 회사명</label>
                <input type="text" id="name" name="name" required placeholder="홍길동 / 주식회사 예시">
            </div>
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" name="email" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label for="phone">연락처</label>
                <input type="tel" id="phone" name="phone" placeholder="010-1234-5678">
            </div>
            <div class="form-group">
                <label for="subject">문의 유형</label>
                <select id="subject" name="subject" required>
                    <option value="" disabled selected>선택해 주세요</option>
                    <option value="제휴 제안">제휴 제안</option>
                    <option value="광고 문의">광고 문의</option>
                    <option value="기술 협업">기술 협업</option>
                    <option value="기타">기타</option>
                </select>
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" rows="5" required placeholder="문의하실 내용을 자세히 적어주세요."></textarea>
            </div>
            <button type="submit" id="submit-btn">문의하기</button>
        </form>
        <div id="success-message" class="hidden">
            <p>문의가 성공적으로 접수되었습니다. 빠른 시일 내에 답변드리겠습니다.</p>
            <a href="index.html" class="back-link">메인으로 돌아가기</a>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-links">
                <a href="privacy.html">개인정보처리방침</a>
                <a href="terms.html">이용약관</a>
                <a href="about.html">사이트 소개</a>
                <a href="contact.html">제휴 문의</a>
            </div>
            <p class="footer-copy">&copy; 2025 딸깍. 본 사이트는 정보 제공 목적으로 운영되며, 당첨을 보장하지 않습니다.</p>
        </div>
    </footer>

    <script src="main.js"></script>
    <script>
        const form = document.getElementById('contact-form');
        const successMessage = document.getElementById('success-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = '전송 중...';

            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'Accept': 'application/json' }
                });
                if (response.ok) {
                    form.classList.add('hidden');
                    successMessage.classList.remove('hidden');
                } else {
                    alert('전송에 실패했습니다. 다시 시도해 주세요.');
                    btn.disabled = false;
                    btn.textContent = '문의하기';
                }
            } catch {
                alert('네트워크 오류가 발생했습니다. 다시 시도해 주세요.');
                btn.disabled = false;
                btn.textContent = '문의하기';
            }
        });
    </script>
</body>
</html>
